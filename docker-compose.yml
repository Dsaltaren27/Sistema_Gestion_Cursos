services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: ${PORT}
      CLIENT_URL: ${CLIENT_URL}
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    command: >
      -url=jdbc:postgresql://db:5432/${DB_DATABASE}
      -user=${DB_USER}
      -password=${DB_PASSWORD}
      -connectRetries=10
      -locations=filesystem:/flyway/sql/V1__create_usuarios.sql,filesystem:/flyway/sql/V2__create_cursos.sql,filesystem:/flyway/sql/V3__create_inscripciones.sql
      migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      db:
        condition: service_healthy
    profiles: [prod]

  flyway-dev:
    image: flyway/flyway:10-alpine
    command: >
      -url=jdbc:postgresql://db:5432/${DB_DATABASE}
      -user=${DB_USER}
      -password=${DB_PASSWORD}
      -connectRetries=10
      -locations=filesystem:/flyway/sql
      migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      db:
        condition: service_healthy
    profiles: [dev]



volumes:
  postgres_data: